---
version: 2
updates:
  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: ubuntu
        update-types:
          - 'version-update:semver-major'
          - 'version-update:semver-minor'
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7
