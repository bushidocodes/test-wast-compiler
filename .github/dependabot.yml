version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Ubuntu is pinned to 20.04 (focal): LLVM 12 is a first-class apt package
      # there but has been dropped from apt on jammy/noble/oracular and later.
      # Upgrading Ubuntu requires migrating off the LLVM 12 C API first.
      - dependency-name: "ubuntu"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
